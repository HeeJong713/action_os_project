<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16タイプ行動OS診断 | Action OS Assessment</title>
    <style>
        /* 分析ツール風のダークテーマ設定 */
        :root {
            --bg-color: #0f172a; /* 深いネイビー */
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-color: #38bdf8; /* サイバーブルー */
            --btn-hover: #0284c7;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-color);
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        /* 共通ボタンデザイン */
        .btn {
            display: inline-block;
            padding: 1rem 3rem;
            margin-top: 2rem;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }
        .btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-sub);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>ACTION OS ASSESSMENT</h1>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; 2026 Action OS Project. All rights reserved.
    </footer>
</body>
</html>
